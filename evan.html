<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evan · Family Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-evan">

  <div class="card">
    <div class="nav" id="nav"></div>

    <div class="header-row">
      <div>
        <h1 id="page-title"></h1>
        <p class="tagline">Your homeschool assignments.</p>
      </div>
      <div class="avatar" id="page-avatar"></div>
    </div>

    <label class="photo-link hidden" id="photo-label">
      Change my photo
      <input type="file" id="photo-input" accept="image/*" class="hidden">
    </label>

    <h2>To do</h2>
    <div id="todo-list"></div>

    <h2>Finished</h2>
    <div id="done-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    /* The ONE line that makes this page Evan's.
       Avery's page is identical except for this constant. */
    const STUDENT = 'Evan';

    mountNav(STUDENT.toLowerCase() + '.html');
    document.getElementById('page-title').textContent = STUDENT + "'s page";
    document.getElementById('page-avatar').textContent = STUDENT.charAt(0);

    async function load() {
      const user = await requireAuth();
      if (!user) return;

      /* .eq() filters ON THE SERVER: only this student's rows
         are even sent to the browser.                          */
      const { data: assignments, error } = await db
        .from('assignments').select('*')
        .eq('assigned_to', STUDENT)
        .order('due_date', { ascending: true });

      const todoBox = document.getElementById('todo-list');
      const doneBox = document.getElementById('done-list');
      todoBox.innerHTML = '';
      doneBox.innerHTML = '';

      if (error) {
        todoBox.textContent = 'Could not load: ' + error.message;
        return;
      }

      const todo = assignments.filter(a => a.status !== 'done');
      const done = assignments.filter(a => a.status === 'done');

      if (todo.length === 0) {
        todoBox.appendChild(el('p', 'item-meta', 'All caught up. Nice work!'));
      }
      for (const a of todo) {
        const item = el('div', 'item');
        const top = el('div', 'item-top');
        top.appendChild(el('span', 'item-title', a.title));
        top.appendChild(el('span', 'pill pill-todo', 'due ' + fmtDate(a.due_date)));
        item.appendChild(top);

        const meta = el('div', 'item-meta');
        meta.appendChild(el('span', subjectChipClass(a.subject), a.subject));
        item.appendChild(meta);

        if (a.instructions) {
          item.appendChild(el('div', 'item-body', a.instructions));
        }
        if (a.link_url) {
          const lessonLink = el('a', 'lesson-link', 'Open lesson →');
          lessonLink.href = a.link_url;
          lessonLink.target = '_blank';   /* opens in a new tab */
          lessonLink.rel = 'noopener';
          item.appendChild(lessonLink);
        }

        /* Sign-off checkbox: ticking it marks the assignment done */
        const check = el('label', 'done-check');
        const box = document.createElement('input');
        box.type = 'checkbox';
        box.addEventListener('change', () => setDone(a, true));
        check.appendChild(box);
        check.appendChild(el('span', null, 'I finished this assignment'));
        item.appendChild(check);

        todoBox.appendChild(item);
      }

      if (done.length === 0) {
        doneBox.appendChild(el('p', 'item-meta', 'Nothing finished yet.'));
      }
      for (const a of done) {
        const item = el('div', 'item');
        const top = el('div', 'item-top');
        top.appendChild(el('span', 'item-title', a.title));
        top.appendChild(el('span', 'pill pill-done', 'Done · ' + fmtDate(a.done_at)));
        item.appendChild(top);

        const meta = el('div', 'item-meta');
        meta.appendChild(el('span', subjectChipClass(a.subject), a.subject));
        item.appendChild(meta);

        /* Already checked; unticking reopens it (misclicks happen) */
        const check = el('label', 'done-check');
        const box = document.createElement('input');
        box.type = 'checkbox';
        box.checked = true;
        box.addEventListener('change', () => setDone(a, false));
        check.appendChild(box);
        check.appendChild(el('span', null, 'Finished'));
        item.appendChild(check);

        doneBox.appendChild(item);
      }
    }

    async function setDone(assignment, isDone) {
      const { error } = await db
        .from('assignments')
        .update({
          status:  isDone ? 'done' : 'assigned',
          done_at: isDone ? new Date().toISOString() : null
        })
        .eq('id', assignment.id);

      if (error) alert('Could not update: ' + error.message);
      load();
    }

    /* ----- Profile photo ----- */
    async function initAvatar(user) {
      const avatar = document.getElementById('page-avatar');
      const url = await avatarUrl(FAMILY_IDS[STUDENT]);
      if (url) {
        avatar.textContent = '';
        const img = document.createElement('img');
        img.src = url;
        img.alt = STUDENT;
        avatar.appendChild(img);
      }

      /* Only show "Change my photo" to the page's own student -
         the storage policy enforces this anyway; hiding it is
         just politeness. */
      if (user.id !== FAMILY_IDS[STUDENT]) return;

      document.getElementById('photo-label').classList.remove('hidden');
      document.getElementById('photo-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const small = await shrinkImage(file);
        const { error } = await db.storage
          .from('avatars')
          .upload(user.id + '.jpg', small, {
            upsert: true,               /* replace any previous photo */
            contentType: 'image/jpeg'
          });

        if (error) alert('Could not upload: ' + error.message);
        initAvatar(user);
      });
    }

    load();
    requireAuth().then(user => { if (user) initAvatar(user); });
  </script>

</body>
</html>
