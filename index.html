<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Hub</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ===== Design tokens ===== */
    :root {
      --ink: #2b2b27;
      --ink-soft: #6b6a62;
      --paper: #faf9f6;
      --card: #ffffff;
      --accent: #2f5d46;
      --accent-dark: #234735;
      --line: #e3e1da;
      --error: #a3322b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .card {
      width: 100%;
      max-width: 380px;
      margin: 40px 24px;
      padding: 40px 36px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    .card.wide { max-width: 620px; }

    h1 {
      margin: 0 0 4px;
      font-size: 26px;
      font-weight: normal;
      letter-spacing: 0.5px;
    }

    h2 {
      margin: 30px 0 10px;
      font-size: 13px;
      font-weight: normal;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .tagline { margin: 0 0 8px; font-size: 14px; color: var(--ink-soft); }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    input, select {
      width: 100%;
      padding: 9px 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    input:focus, select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }
    button.full { width: 100%; margin-top: 20px; }
    button.quiet {
      background: none;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    button.quiet:hover { background: var(--paper); }

    .error { margin: 12px 0 0; font-size: 14px; color: var(--error); min-height: 1em; }
    .hidden { display: none; }

    /* ===== Header row ===== */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex: none;
    }

    .avatar.small {
      width: 26px;
      height: 26px;
      font-size: 12px;
      background: var(--paper);
      color: var(--accent);
      border: 1px solid var(--line);
    }

    /* ===== Stats row ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      padding: 12px 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .stat .num { font-size: 22px; }
    .stat .lbl { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

    /* ===== Goal cards ===== */
    .goal {
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .goal-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .goal-title { font-size: 16px; }
    .goal-meta { margin-top: 4px; font-size: 13px; color: var(--ink-soft); }
    .goal-note { margin-top: 6px; font-size: 13px; color: var(--ink-soft); font-style: italic; }

    .pill {
      font-size: 12px;
      font-family: inherit;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
      flex: none;
    }

    .pill-not  { background: #efede6; color: #6b6a62; }
    .pill-prog { background: #f6ead2; color: #7a5418; }
    .pill-done { background: #e6eedd; color: #3c5a2c; }

    .group-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 0 8px;
      font-size: 14px;
    }

    /* ===== Collapsible sections (native, no JavaScript needed) ===== */
    details { margin-top: 10px; }

    summary {
      cursor: pointer;
      font-size: 13px;
      color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .note-row { display: flex; gap: 8px; }
    .note-row input { flex: 1; }
  </style>
</head>
<body>

  <!-- ===== View 1: sign in ===== -->
  <div class="card" id="login-view">
    <h1>Family Hub</h1>
    <p class="tagline">Sign in to continue.</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email">

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password">

    <button class="full" id="sign-in-button">Sign in</button>
    <p class="error" id="error-message"></p>
  </div>

  <!-- ===== View 2: dashboard ===== -->
  <div class="card wide hidden" id="welcome-view">
    <div class="nav" id="nav"></div>

    <div class="header-row">
      <div>
        <h1>Family Hub</h1>
        <p class="tagline" id="welcome-message"></p>
      </div>
      <div class="avatar" id="user-avatar"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="stat-active">–</div><div class="lbl">Active goals</div></div>
      <div class="stat"><div class="num" id="stat-due">–</div><div class="lbl">Due this month</div></div>
      <div class="stat"><div class="num" id="stat-done">–</div><div class="lbl">Completed this year</div></div>
    </div>

    <details>
      <summary>+ Add a goal</summary>
      <label for="new-title">Goal</label>
      <input id="new-title" type="text" placeholder="Read 12 books this year">
      <label for="new-owner">Owner</label>
      <input id="new-owner" type="text" placeholder="Elena, or Family">
      <label for="new-scope">Scope</label>
      <select id="new-scope">
        <option value="individual">Individual</option>
        <option value="family">Family</option>
      </select>
      <label for="new-date">Target date</label>
      <input id="new-date" type="date">
      <button class="full" id="add-goal-button">Add goal</button>
      <p class="error" id="add-error"></p>
    </details>

    <h2>Family goals</h2>
    <div id="family-goals"></div>

    <h2>Individual goals</h2>
    <div id="individual-goals"></div>

    <h2>Recently completed</h2>
    <div id="completed-goals"></div>

    <button class="full quiet" id="sign-out-button">Sign out</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <script>
    /* Connection (db), el(), displayName(), and fmtDate() now
       come from app.js - your keys live there, in one place. */

    mountNav('index.html');

    let currentUser = null;   /* remembered after sign-in, used to sign notes */

    const STATUS_LABELS = {
      not_started: 'Not started',
      in_progress: 'In progress',
      done: 'Done'
    };

    const PILL_CLASSES = {
      not_started: 'pill pill-not',
      in_progress: 'pill pill-prog',
      done: 'pill pill-done'
    };

    /* ===== 3. View switching ===== */
    function showWelcome(user) {
      currentUser = user;
      welcomeMessage.textContent = 'Signed in as ' + displayName(user);
      document.getElementById('user-avatar').textContent =
        displayName(user).charAt(0);
      loginView.classList.add('hidden');
      welcomeView.classList.remove('hidden');
      loadDashboard();
    }

    function showLogin() {
      currentUser = null;
      loginView.classList.remove('hidden');
      welcomeView.classList.add('hidden');
    }

    const loginView      = document.getElementById('login-view');
    const welcomeView    = document.getElementById('welcome-view');
    const errorMessage   = document.getElementById('error-message');
    const welcomeMessage = document.getElementById('welcome-message');

    /* ===== 4. Load everything and draw the dashboard ===== */
    async function loadDashboard() {
      /* Two reads: all goals, and all notes (newest first) */
      const { data: goals, error: goalsError } = await db
        .from('goals').select('*')
        .order('target_date', { ascending: true });

      const { data: notes, error: notesError } = await db
        .from('goal_notes').select('*')
        .order('created_at', { ascending: false });

      if (goalsError || notesError) {
        document.getElementById('family-goals').textContent =
          'Could not load: ' + (goalsError || notesError).message;
        return;
      }

      /* Find the newest note for each goal. Notes arrive newest-first,
         so the first one we meet per goal_id is the latest. */
      const latestNote = {};
      for (const note of notes) {
        if (!(note.goal_id in latestNote)) latestNote[note.goal_id] = note;
      }

      /* --- Stats --- */
      const now = new Date();
      const active = goals.filter(g => g.status !== 'done');
      const dueThisMonth = active.filter(g => {
        const d = new Date(g.target_date + 'T00:00:00');
        return d.getMonth() === now.getMonth() &&
               d.getFullYear() === now.getFullYear();
      });
      const doneThisYear = goals.filter(g =>
        g.status === 'done' &&
        g.completed_at &&
        new Date(g.completed_at).getFullYear() === now.getFullYear()
      );

      document.getElementById('stat-active').textContent = active.length;
      document.getElementById('stat-due').textContent    = dueThisMonth.length;
      document.getElementById('stat-done').textContent   = doneThisYear.length;

      /* --- Family goals (active only) --- */
      const familyBox = document.getElementById('family-goals');
      familyBox.innerHTML = '';
      const familyGoals = active.filter(g => g.scope === 'family');
      if (familyGoals.length === 0) {
        familyBox.appendChild(el('p', 'goal-meta', 'No family goals yet.'));
      }
      for (const goal of familyGoals) {
        familyBox.appendChild(goalCard(goal, latestNote[goal.id], false));
      }

      /* --- Individual goals, grouped by owner --- */
      const indivBox = document.getElementById('individual-goals');
      indivBox.innerHTML = '';
      const indivGoals = active.filter(g => g.scope === 'individual');
      if (indivGoals.length === 0) {
        indivBox.appendChild(el('p', 'goal-meta', 'No individual goals yet.'));
      }

      /* Collect unique owner names, keeping first-seen order */
      const owners = [...new Set(indivGoals.map(g => g.owner_name))];
      for (const owner of owners) {
        const head = el('div', 'group-head');
        head.appendChild(el('div', 'avatar small', owner.charAt(0)));
        head.appendChild(el('span', null, owner));
        indivBox.appendChild(head);

        for (const goal of indivGoals.filter(g => g.owner_name === owner)) {
          indivBox.appendChild(goalCard(goal, latestNote[goal.id], true));
        }
      }

      /* --- Recently completed (newest first, up to 6) --- */
      const doneBox = document.getElementById('completed-goals');
      doneBox.innerHTML = '';
      const completed = goals
        .filter(g => g.status === 'done')
        .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''))
        .slice(0, 6);
      if (completed.length === 0) {
        doneBox.appendChild(el('p', 'goal-meta', 'Nothing completed yet. Soon!'));
      }
      for (const goal of completed) {
        const item = el('div', 'goal');
        const top = el('div', 'goal-top');
        top.appendChild(el('span', 'goal-title', goal.title + ' — ' + goal.owner_name));
        top.appendChild(el('span', 'pill pill-done',
          'Done · ' + fmtDate(goal.completed_at)));
        item.appendChild(top);
        doneBox.appendChild(item);
      }
    }

    /* ===== 5. Build one goal card ===== */
    function goalCard(goal, note, hideOwner) {
      const card = el('div', 'goal');

      const top = el('div', 'goal-top');
      top.appendChild(el('span', 'goal-title', goal.title));
      top.appendChild(el('span', PILL_CLASSES[goal.status],
        STATUS_LABELS[goal.status]));
      card.appendChild(top);

      const metaText = (hideOwner ? '' : goal.owner_name + ' · ') +
        'due ' + fmtDate(goal.target_date);
      card.appendChild(el('div', 'goal-meta', metaText));

      if (note) {
        card.appendChild(el('div', 'goal-note',
          '"' + note.note + '" — ' + note.author_name));
      }

      /* Collapsible update controls */
      const details = el('details');
      details.appendChild(el('summary', null, 'Update'));

      const actions = el('div', 'actions');

      /* Status dropdown */
      const statusSelect = el('select');
      for (const value of ['not_started', 'in_progress', 'done']) {
        const option = el('option', null, STATUS_LABELS[value]);
        option.value = value;
        if (value === goal.status) option.selected = true;
        statusSelect.appendChild(option);
      }
      statusSelect.addEventListener('change', () =>
        updateStatus(goal, statusSelect.value));
      actions.appendChild(statusSelect);

      /* Note input + save button */
      const noteRow = el('div', 'note-row');
      const noteInput = el('input');
      noteInput.placeholder = 'Add a progress note...';
      const noteButton = el('button', 'quiet', 'Save note');
      noteButton.addEventListener('click', () =>
        addNote(goal, noteInput.value.trim()));
      noteRow.appendChild(noteInput);
      noteRow.appendChild(noteButton);
      actions.appendChild(noteRow);

      details.appendChild(actions);
      card.appendChild(details);

      return card;
    }

    /* ===== 6. Write actions ===== */

    async function updateStatus(goal, newStatus) {
      const changes = { status: newStatus };
      /* History rule: record WHEN it was finished; clear it if reopened */
      changes.completed_at =
        newStatus === 'done' ? new Date().toISOString() : null;

      const { error } = await db
        .from('goals')
        .update(changes)
        .eq('id', goal.id);   /* only the row whose id matches this goal */

      if (error) alert('Could not update: ' + error.message);
      loadDashboard();
    }

    async function addNote(goal, text) {
      if (!text) return;

      const { error } = await db.from('goal_notes').insert({
        goal_id: goal.id,
        author_name: displayName(currentUser),
        note: text
      });

      if (error) alert('Could not save note: ' + error.message);
      loadDashboard();
    }

    document.getElementById('add-goal-button').addEventListener('click', async () => {
      const addError = document.getElementById('add-error');
      addError.textContent = '';

      const newGoal = {
        title:       document.getElementById('new-title').value.trim(),
        owner_name:  document.getElementById('new-owner').value.trim(),
        scope:       document.getElementById('new-scope').value,
        target_date: document.getElementById('new-date').value,
        status:      'not_started'
      };

      if (!newGoal.title || !newGoal.owner_name || !newGoal.target_date) {
        addError.textContent = 'Please fill in the goal, owner, and target date.';
        return;
      }

      const { error } = await db.from('goals').insert(newGoal);
      if (error) {
        addError.textContent = 'Could not save: ' + error.message;
        return;
      }

      document.getElementById('new-title').value = '';
      document.getElementById('new-owner').value = '';
      document.getElementById('new-date').value  = '';
      loadDashboard();
    });

    /* ===== 7. Auth ===== */
    document.getElementById('sign-in-button').addEventListener('click', async () => {
      errorMessage.textContent = '';
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) {
        errorMessage.textContent = error.message;
      } else {
        showWelcome(data.user);
      }
    });

    document.getElementById('sign-out-button').addEventListener('click', async () => {
      await db.auth.signOut();
      showLogin();
    });

    db.auth.getSession().then(({ data }) => {
      if (data.session) showWelcome(data.session.user);
    });
  </script>

</body>
</html>
