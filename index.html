<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Hub</title>

  <style>
    /* ===== Design tokens: change these to restyle the whole page ===== */
    :root {
      --ink: #2b2b27;        /* main text */
      --ink-soft: #6b6a62;   /* secondary text */
      --paper: #faf9f6;      /* page background */
      --card: #ffffff;       /* card background */
      --accent: #2f5d46;     /* deep green - buttons and focus */
      --accent-dark: #234735;
      --line: #e3e1da;       /* borders */
      --error: #a3322b;
      --done: #4a6b3a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .card {
      width: 100%;
      max-width: 380px;
      margin: 24px;
      padding: 40px 36px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    /* The signed-in view gets a wider card to fit the goal list */
    .card.wide { max-width: 540px; }

    h1 {
      margin: 0 0 4px;
      font-size: 26px;
      font-weight: normal;
      letter-spacing: 0.5px;
    }

    h2 {
      margin: 28px 0 10px;
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .tagline {
      margin: 0 0 28px;
      font-size: 14px;
      color: var(--ink-soft);
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }

    .error {
      margin: 14px 0 0;
      font-size: 14px;
      color: var(--error);
      min-height: 1em;
    }

    .hidden { display: none; }

    /* ===== Goal list styles ===== */
    .goal {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .goal:last-child { border-bottom: none; }

    .goal-title { font-size: 16px; }

    .goal-meta {
      margin-top: 3px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .goal.done .goal-title {
      color: var(--done);
    }
  </style>
</head>
<body>

  <!-- ===== View 1: the sign-in form ===== -->
  <div class="card" id="login-view">
    <h1>Family Hub</h1>
    <p class="tagline">Sign in to continue.</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email">

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password">

    <button id="sign-in-button">Sign in</button>
    <p class="error" id="error-message"></p>
  </div>

  <!-- ===== View 2: the goals dashboard (after login) ===== -->
  <div class="card wide hidden" id="welcome-view">
    <h1>Family Hub</h1>
    <p class="tagline" id="welcome-message"></p>

    <h2>Family goals</h2>
    <div id="family-goals"></div>

    <h2>Individual goals</h2>
    <div id="individual-goals"></div>

    <button id="sign-out-button">Sign out</button>
  </div>

  <!-- ===== Load the Supabase library from a CDN ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /* ===== 1. Connect to your Supabase project ===== */
    const SUPABASE_URL = 'https://lsfnfvanmidcesklxpoz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NUiXhSLwm5fNIzGll1QlOA_Hhr9MHe7';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ===== 2. Page elements ===== */
    const loginView      = document.getElementById('login-view');
    const welcomeView    = document.getElementById('welcome-view');
    const errorMessage   = document.getElementById('error-message');
    const welcomeMessage = document.getElementById('welcome-message');

    /* ===== 3. Switch between views ===== */
    function showWelcome(user) {
      welcomeMessage.textContent = 'Signed in as ' + user.email;
      loginView.classList.add('hidden');
      welcomeView.classList.remove('hidden');
      loadGoals();   // fetch the goal list every time the dashboard appears
    }

    function showLogin() {
      loginView.classList.remove('hidden');
      welcomeView.classList.add('hidden');
    }

    /* ===== 4. Fetch goals from the database and draw them =====
       db.from('goals').select('*') means:
       "from the goals table, give me every column of every row
        my permissions allow me to see."                          */
    async function loadGoals() {
      const { data: goals, error } = await db
        .from('goals')
        .select('*')
        .order('target_date', { ascending: true });

      if (error) {
        document.getElementById('family-goals').textContent =
          'Could not load goals: ' + error.message;
        return;
      }

      renderList('family-goals',     goals.filter(g => g.scope === 'family'));
      renderList('individual-goals', goals.filter(g => g.scope === 'individual'));
    }

    /* Turn a list of goal rows into HTML inside the given container */
    function renderList(containerId, goals) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';   // clear out whatever was there before

      if (goals.length === 0) {
        container.innerHTML = '<p class="goal-meta">Nothing here yet.</p>';
        return;
      }

      for (const goal of goals) {
        const item = document.createElement('div');
        item.className = 'goal' + (goal.status === 'done' ? ' done' : '');

        const title = document.createElement('div');
        title.className = 'goal-title';
        title.textContent = goal.title;

        const meta = document.createElement('div');
        meta.className = 'goal-meta';
        meta.textContent =
          goal.owner_name + ' · ' +
          formatStatus(goal.status) + ' · due ' +
          goal.target_date;

        item.appendChild(title);
        item.appendChild(meta);
        container.appendChild(item);
      }
    }

    /* Make "not_started" read as "Not started", etc. */
    function formatStatus(status) {
      const labels = {
        not_started: 'Not started',
        in_progress: 'In progress',
        done: 'Done'
      };
      return labels[status] || status;
    }

    /* ===== 5. Sign in ===== */
    document.getElementById('sign-in-button').addEventListener('click', async () => {
      errorMessage.textContent = '';

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errorMessage.textContent = error.message;
      } else {
        showWelcome(data.user);
      }
    });

    /* ===== 6. Sign out ===== */
    document.getElementById('sign-out-button').addEventListener('click', async () => {
      await db.auth.signOut();
      showLogin();
    });

    /* ===== 7. On page load: resume an existing session if there is one ===== */
    db.auth.getSession().then(({ data }) => {
      if (data.session) {
        showWelcome(data.session.user);
      }
    });
  </script>

</body>
</html>
